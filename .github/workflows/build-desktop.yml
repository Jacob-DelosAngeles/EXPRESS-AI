name: Build Desktop Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write   # Required to create GitHub Releases and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Python: bundle the FastAPI sidecar ---
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install pyinstaller
          pip install -r server/requirements.txt

      - name: Bundle Python backend with PyInstaller
        run: |
          cd desktop
          pyinstaller pyinstaller.spec --clean --noconfirm

      # --- Node: build the React frontend ---
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build React frontend
        env:
          # A placeholder key is required so main.jsx doesn't throw a fatal error
          # during build. In desktop mode, Clerk is bypassed entirely at runtime.
          VITE_CLERK_PUBLISHABLE_KEY: pk_live_placeholder_desktop_build_only
          # Use './' base path so Electron's file:// protocol resolves assets correctly.
          ELECTRON_BUILD: 'true'
        run: |
          cd client
          npm ci
          npm run build

      # --- Electron: package into .exe ---
      - name: Install Electron dependencies
        run: |
          cd desktop/electron
          npm install

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd desktop/electron
          npm run build:win

      # --- Upload the installer to GitHub Release ---
      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/electron/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
