<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DAAN-FERN</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-app-region: drag;
      overflow: hidden;
    }

    .splash-card {
      width: 360px;
      padding: 40px 32px;
      background: rgba(15, 15, 25, 0.92);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(100, 120, 255, 0.15);
      box-shadow:
        0 0 40px rgba(80, 100, 255, 0.12),
        0 20px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #6478FF 0%, #8B5CF6 50%, #06B6D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 16px;
    }

    .loader-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6478FF;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .status {
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="splash-card">
    <div class="logo-text">DAAN-FERN</div>
    <div class="subtitle">Road Analytics Desktop</div>
    <div class="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
    <div class="status">Starting analysis engine...</div>
  </div>
</body>
</html>
